<!DOCTYPE html>
<html lang="tr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Drone Fleet Tracking System</title>

    <!-- LEAFLET -->

    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #071739;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            padding: 40px;
        }

        h1 {
            text-align: center;
            font-size: 72px;
            margin-bottom: 40px;
            color: #42bfff;
        }

        #map {
            width: 100%;
            height: 650px;
            border-radius: 24px;
            overflow: hidden;
        }
    </style>

</head>

<body>

    <h1>Drone Fleet Tracking System</h1>

    <div id="map"></div>

    <!-- LEAFLET -->

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>

    <!-- SIGNALR -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js">
    </script>

    <script>

        // =========================
        // MAP
        // =========================

        const map = L.map('map')
            .setView([41.0082, 28.9784], 10);

        L.tileLayer(
            'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
            {
                attribution:
                    '&copy; OpenStreetMap contributors'
            }
        ).addTo(map);

        // =========================
        // SIGNALR
        // =========================

        const connection =
            new signalR.HubConnectionBuilder()
                .withUrl("/droneHub")
                .build();

        // =========================
        // DRONE STORAGE
        // =========================

        const droneMarkers = {};

        const dronePaths = {};

        // =========================
        // REALTIME RECEIVE
        // =========================

        connection.on(
            "ReceiveTelemetry",
            function (drone) {

                const position = [
                    drone.latitude,
                    drone.longitude
                ];

                // MARKER

                if (!droneMarkers[drone.droneCode]) {

                    const marker =
                        L.marker(position)
                            .addTo(map);

                    marker.bindPopup(`
                            <b>${drone.droneCode}</b><br>
                            Battery: %${drone.battery}<br>
                            Speed: ${drone.speed}<br>
                            Altitude: ${drone.altitude}<br>
                            Risk Score: ${drone.riskScore}<br>
                            Status: ${drone.status}
                        `);

                    droneMarkers[drone.droneCode] =
                        marker;
                }
                else {

                    const marker =
                        droneMarkers[drone.droneCode];

                    marker.setLatLng(position);

                    marker.setPopupContent(`
                            <b>${drone.droneCode}</b><br>
                            Battery: %${drone.battery}<br>
                            Speed: ${drone.speed}<br>
                            Altitude: ${drone.altitude}<br>
                            Risk Score: ${drone.riskScore}<br>
                            Status: ${drone.status}
                        `);
                }

                // PATH

                if (!dronePaths[drone.droneCode]) {

                    dronePaths[drone.droneCode] =
                        L.polyline(
                            [],
                            {
                                color: 'cyan',
                                weight: 4
                            }
                        ).addTo(map);
                }

                dronePaths[drone.droneCode]
                    .addLatLng(position);

                // CAMERA FOLLOW

                map.panTo(
                    position,
                    {
                        animate: true,
                        duration: 1
                    }
                );
            }
        );

        // =========================
        // SIGNALR START
        // =========================

        connection.start()
            .then(() => {

                console.log(
                    "SignalR Connected"
                );

                startDroneSimulation();

            })
            .catch(error =>
                console.log(error)
            );

        // =========================
        // DRONE SIMULATION
        // =========================

        function startDroneSimulation() {

            let latitude = 41.0082;

            let longitude = 28.9784;

            setInterval(async () => {

                // RANDOM MOVEMENT

                latitude +=
                    (Math.random() - 0.5) * 0.01;

                longitude +=
                    (Math.random() - 0.5) * 0.01;

                const telemetry = {

                    droneCode: "DRN-001",

                    latitude: latitude,

                    longitude: longitude,

                    battery:
                        Math.floor(
                            Math.random() * 100
                        ),

                    speed:
                        Math.floor(
                            Math.random() * 200
                        ),

                    altitude:
                        Math.floor(
                            Math.random() * 1000
                        )
                };

                await fetch(
                    "https://localhost:7040/api/DroneTelemetry/create",
                    {
                        method: "POST",

                        headers: {
                            "Content-Type":
                                "application/json"
                        },

                        body:
                            JSON.stringify(
                                telemetry
                            )
                    }
                );

            }, 2000);
        }

    </script>

</body>

</html>
